# This workflow will build the Minecraft mod using Gradle on push, pull request, and manual events
# It is designed for RetroFuturaGradle 2.0.2 with Java 21 for Gradle and Java 8 for compilation

name: Build SimpleDifficulty Mod

on:
  push:
    branches: [ main, master, testing ]
  pull_request:
    branches: [ main, master, testing ]
  workflow_dispatch:

# Permissions required for the bot to publish the Releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      # CRITICAL: Set up Java 25 for Gradle (required by RetroFuturaGradle 2.0.2)
      - name: Set up JDK 25 for Gradle
        uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Cache Gradle dependencies to speed up builds
      - name: Cache Gradle packages
        uses: actions/cache@v5.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Build the mod with RetroFuturaGradle
      # RFG will automatically use Java 8 toolchain for compilation
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
      
      - name: Upload All Mod Jars
        uses: actions/upload-artifact@v7.0.1
        with:
          name: SimpleDifficulty Mod Jars
          path: build/libs/*.jar
          if-no-files-found: error